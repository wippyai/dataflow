version: "1.0"
namespace: app

entries:
  - name: wait_for_boot
    kind: function.lua
    meta:
      type: test
      suite: "00_setup"
      comment: Waits for bootloader to apply migrations before tests run
    source: file://wait_for_boot.lua
    modules:
      - sql
      - time
    imports:
      encryption_key_bootloader: wippy.bootloader.bootloaders:encryption_key
      migration_bootloader: wippy.migration:migration_bootloader
    method: run

  - name: wake_service_scope_test
    kind: function.lua
    meta:
      type: test
      suite: "00_setup"
      comment: Proves the bounded wake service carries canonical module-owned process authority.
    source: file://wake_service_scope_test.lua
    modules:
      - registry
    imports:
      test: wippy.test:test
    method: run

  - name: db
    kind: db.sql.sqlite
    meta:
      comment: File-backed SQLite for tests, recreated each run via make test. An in-memory DB drops its schema under the parallel connections the recovery and signal suites open.
    file: ./.wippy/test.db

  - name: env_storage
    kind: env.storage.file
    meta:
      type: envstorage
    file_path: ./.wippy/test.env
    auto_create: true

  - name: processes
    kind: process.host
    lifecycle:
      auto_start: true

  - name: test_policy
    kind: security.policy
    groups:
      - dataflow_test_runtime
    policy:
      resources: '*'
      actions: '*'
      effect: allow

  - name: execution_identity.capture
    kind: function.lua
    meta:
      environment: test
      test_only: true
      comment: Captures the explicit test actor and policy used by the test runner.
    source: file://execution_identity.lua
    method: capture
    modules: &execution_identity_modules [json, process, security]
    imports: &execution_identity_imports
      dataflow_repo: userspace.dataflow.persist:dataflow_repo

  - name: execution_identity.spawn_orchestrator
    kind: function.lua
    meta:
      environment: test
      test_only: true
      comment: Reconstructs the persisted test identity for durable wake delivery.
    source: file://execution_identity.lua
    method: spawn_orchestrator
    modules: *execution_identity_modules
    imports: *execution_identity_imports

  - name: execution_identity.binding
    kind: contract.binding
    meta:
      environment: test
      test_only: true
      comment: Test-only implementation of Dataflow's application-owned identity bridge.
    contracts:
      - contract: userspace.dataflow:execution_identity
        default: true
        methods:
          capture: app:execution_identity.capture
          spawn_orchestrator: app:execution_identity.spawn_orchestrator

  - name: gateway
    kind: http.service
    addr: :19097
    lifecycle:
      auto_start: false

  - name: api
    kind: http.router
    meta:
      server: gateway
    prefix: /api

  - name: api.public
    kind: http.router
    meta:
      server: gateway
    prefix: /api/public

  - name: dep.wippy.dataflow
    kind: ns.dependency
    meta:
      description: Dataflow module configuration for testing
    component: "wippy/dataflow"
    version: "*"
    parameters:
      - name: userspace.dataflow:target_db
        value: app:db
      - name: userspace.dataflow:process_host
        value: app:processes
      - name: wippy.migration:app_db
        value: app:db

  - name: dep.wippy.bootloader
    kind: ns.dependency
    meta:
      description: Bootloader dependency configuration for testing
    component: "wippy/bootloader"
    version: "*"
    parameters:
      - name: wippy.bootloader:application_host
        value: app:processes
      - name: wippy.bootloader:env_storage
        value: app:env_storage

  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: LLM dependency configuration for testing
    component: "wippy/llm"
    version: "*"
    parameters:
      - name: wippy.llm:process_host
        value: app:processes
      - name: wippy.llm:env_storage
        value: app:env_storage

  - name: dep.wippy.session
    kind: ns.dependency
    meta:
      description: Session dependency configuration for testing
    component: "wippy/session"
    version: "*"
    parameters:
      - name: wippy.session:database_resource
        value: app:db
      - name: wippy.session:api_router
        value: app:api.public
      - name: wippy.session:env_storage
        value: app:env_storage
      - name: wippy.session:delegation_func_id
        value: userspace.dataflow.session:delegate

  - name: dep.wippy.views
    kind: ns.dependency
    meta:
      description: Views dependency configuration for testing
    component: "wippy/views"
    version: "*"
    parameters:
      - name: wippy.views:api_router
        value: app:api.public
      - name: wippy.views:env_storage
        value: app:env_storage
