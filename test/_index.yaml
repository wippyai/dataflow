version: "1.0"
namespace: app

entries:
  - name: wait_for_boot
    kind: function.lua
    meta:
      type: test
      suite: "00_setup"
      comment: Waits for bootloader to apply migrations before tests run
    source: file://wait_for_boot.lua
    modules:
      - sql
      - time
    imports:
      encryption_key_bootloader: wippy.bootloader.bootloaders:encryption_key
      migration_bootloader: wippy.migration:migration_bootloader
    method: run

  - name: db
    kind: db.sql.sqlite
    meta:
      comment: In-memory database for dataflow tests
    file: ":memory:"

  - name: env_storage
    kind: env.storage.os
    meta:
      type: envstorage

  - name: processes
    kind: process.host
    lifecycle:
      auto_start: true

  - name: gateway
    kind: http.service
    addr: :19097
    lifecycle:
      auto_start: false

  - name: api
    kind: http.router
    meta:
      server: gateway
    prefix: /api

  - name: api.public
    kind: http.router
    meta:
      server: gateway
    prefix: /api/public

  - name: dep.wippy.dataflow
    kind: ns.dependency
    meta:
      description: Dataflow module configuration for testing
    component: "wippy/dataflow"
    parameters:
      - name: target_db
        value: app:db

  - name: dep.wippy.bootloader
    kind: ns.dependency
    meta:
      description: Bootloader dependency configuration for testing
    component: "wippy/bootloader"
    parameters:
      - name: application_host
        value: app:processes
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: LLM dependency configuration for testing
    component: "wippy/llm"
    parameters:
      - name: process_host
        value: app:processes
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.session
    kind: ns.dependency
    meta:
      description: Session dependency configuration for testing
    component: "wippy/session"
    parameters:
      - name: database_resource
        value: app:db
      - name: api_router
        value: app:api.public
      - name: env_storage
        value: app:env_storage

  - name: dep.wippy.views
    kind: ns.dependency
    meta:
      description: Views dependency configuration for testing
    component: "wippy/views"
    parameters:
      - name: api_router
        value: app:api.public
