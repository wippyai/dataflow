name: Release Please

on:
  push:
    branches: [master]

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml

  release:
    needs: checks
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy-dry-run:
    name: Deploy dry run
    needs: release
    if: ${{ needs.release.outputs.created == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: v${{ needs.release.outputs.version }}
          persist-credentials: false

      - id: wippy
        uses: ./.github/actions/setup-wippy

      - name: Deploy dry run
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          WIPPY: ${{ steps.wippy.outputs.path }}
          WIPPY_TOKEN: ${{ secrets.WIPPY_TOKEN }}
        run: |
          set -euo pipefail
          manifest_version="$(awk '/^version:/ { print $2; exit }' wippy.yaml)"
          test "$manifest_version" = "$RELEASE_VERSION"
          "$WIPPY" publish --version "$RELEASE_VERSION" --dry-run
