name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/ci.yml

  release:
    needs: checks
    uses: wippyai/template-module/.github/workflows/reusable-release.yml@v1
    with:
      publish: true
    secrets: inherit
