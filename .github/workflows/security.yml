name: Security checks

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-syntax:
    name: Workflow syntax
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          check-latest: false
          cache: false
      - name: Test runtime signature verifier
        run: (cd .github/actions/setup-wippy && go test .)
      - name: Validate GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12 .github/workflows/*.yml

  secrets:
    name: Secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26.5
          check-latest: false
          cache: false
      - name: Scan repository history for secrets
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 detect --config .gitleaks.toml --source . --no-banner --redact

  actions-security:
    name: Actions security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read # Required for Zizmor online audits of referenced GitHub Actions.
      contents: read
      security-events: write # Required to upload the Zizmor SARIF report for code scanning.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - id: zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: true
          inputs: .github
          online-audits: true
          persona: pedantic
          version: v1.27.0
          color: false
      - name: Fail if workflow risks are found
        env:
          SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
        run: |
          set -euo pipefail
          test -f "$SARIF_FILE"
          test "$(jq '[.runs[].results[]?] | length' "$SARIF_FILE")" -eq 0
