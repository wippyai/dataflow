version: "1.0"
namespace: userspace.dataflow.node.agent.stub

entries:
  - name: truncation_generate
    kind: function.lua
    meta:
      type: llm_function
      comment: Stub LLM generate that returns truncated response on first call
    source: file://truncation_generate.lua
    imports:
      output: wippy.llm:output
    method: handler

  - name: truncation_driver
    kind: contract.binding
    meta:
      name: Truncation Test Driver
      comment: Test driver that simulates truncated LLM responses
    contracts:
      - contract: wippy.llm:generator
        methods:
          generate: userspace.dataflow.node.agent.stub:truncation_generate

  - name: truncation_provider
    kind: registry.entry
    meta:
      name: truncation-test
      type: llm.provider
      title: Truncation Test Provider
      comment: Mock provider for truncation testing
    driver:
      id: userspace.dataflow.node.agent.stub:truncation_driver

  - name: truncation_model
    kind: registry.entry
    meta:
      name: truncation-test-model
      type: llm.model
      title: Truncation Test Model
      comment: Mock model for truncation testing
    providers:
      - id: userspace.dataflow.node.agent.stub:truncation_provider
        provider_model: truncation-test-model

  - name: truncation_test_agent
    kind: registry.entry
    meta:
      type: agent.gen1
      name: truncation-test-agent
      title: Truncation Test Agent
      comment: Agent for testing truncation handling in dataflow
    model: truncation-test-model
    temperature: 0
    max_tokens: 100
    prompt: |
      You are a test agent. Complete the task.
    tools: []
