version: "1.0"
namespace: userspace.dataflow.node.agent

entries:
  # userspace.dataflow.node.agent:consts
  - name: consts
    kind: library.lua
    meta:
      name: Agent Node Constants
      comment: Centralized constants for agent node execution including data types, status messages, error codes, and configuration defaults.
      tags:
        - dataflow
        - agent
        - node
        - constants
      description: |
        Provides all constants needed for agent node execution including data types for persistence,
        status messages, error codes, configuration defaults, and control directive support.
        Centralizes string constants to avoid duplication across agent node components.
    source: file://consts.lua
    method: consts
    
  # userspace.dataflow.node.agent:control_handler
  - name: control_handler
    kind: library.lua
    meta:
      name: Agent Control Directive Handler
      comment: Processes _control directives from tool results including agent/model changes, memory operations, context manipulation, and yield handling.
      tags:
        - dataflow
        - agent
        - control
        - directives
        - yield
      description: |
        Handles all _control directive processing for agent nodes including runtime agent/model switching,
        memory operations (add/clear/delete), context manipulation (session/public_meta), artifact creation,
        command queuing, and yield handling with child workflow support. Processes control directives from
        tool results and applies changes to agent context and node state.
    source: file://control_handler.lua
    modules:
      - json
      - time
      - uuid
    imports:
      agent_consts: userspace.dataflow.node.agent:consts
      consts: userspace.dataflow:consts

  # userspace.dataflow.node.agent:control_handler_test
  - name: control_handler_test
    kind: function.lua
    meta:
      name: Agent Control Handler Tests
      type: test
      comment: Unit tests for _control session/public_meta context merge and memory add/clear/delete via the node SDK.
      group: Workflow / Agent Node
    source: file://control_handler_test.lua
    modules:
      - json
      - uuid
    imports:
      control_handler: userspace.dataflow.node.agent:control_handler
      node: userspace.dataflow:node
      consts: userspace.dataflow:consts
      agent_consts: userspace.dataflow.node.agent:consts
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow.node.agent:control_handler_integration_test
  - name: control_handler_integration_test
    kind: function.lua
    meta:
      name: Agent Control Handler Integration Tests
      type: test
      comment: Real-DB integration tests for _control memory lifecycle (add/clear/delete) and session context merge persisted to node metadata.
      group: Workflow / Agent Node
    source: file://control_handler_integration_test.lua
    modules:
      - json
      - uuid
    imports:
      control_handler: userspace.dataflow.node.agent:control_handler
      client: userspace.dataflow:client
      node: userspace.dataflow:node
      data_reader: userspace.dataflow.persist:data_reader
      node_reader: userspace.dataflow.persist:node_reader
      commit: userspace.dataflow.persist:commit
      agent_context: wippy.agent:context
      consts: userspace.dataflow:consts
      agent_consts: userspace.dataflow.node.agent:consts
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow.node.agent:delegation_handler
  - name: delegation_handler
    kind: library.lua
    meta:
      name: Agent Delegation Handler
      comment: Manages delegation workflows including child node creation, result routing, yield coordination, and conversation integration.
      tags:
        - dataflow
        - agent
        - delegation
        - yield
        - children
      description: |
        Unified delegation management for both agent framework delegations and control directive delegations.
        Handles child agent node creation, input/output routing, yield coordination, result integration,
        error handling, and conversation mapping. Preserves delegation context across agent changes and
        ensures proper tool call ID mapping for delegation results.
    source: file://delegation_handler.lua
    modules:
      - json
      - uuid
    imports:
      agent_ref: userspace.dataflow:agent_ref
      agent_consts: userspace.dataflow.node.agent:consts
      data_reader: userspace.dataflow.persist:data_reader
      node_reader: userspace.dataflow.persist:node_reader
    method: delegation_handler

  # userspace.dataflow.node.agent:delegation_handler_test
  - name: delegation_handler_test
    kind: function.lua
    meta:
      name: Delegation Recovery Idempotency Tests
      type: test
      comment: Real-DB tests that a recovery re-issue of an in-flight delegation reuses the existing child agent instead of duplicating it.
      group: Workflow / Agent Node
    source: file://delegation_handler_test.lua
    modules:
      - uuid
    imports:
      delegation_handler: userspace.dataflow.node.agent:delegation_handler
      client: userspace.dataflow:client
      node: userspace.dataflow:node
      node_reader: userspace.dataflow.persist:node_reader
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      test: wippy.test:test
    method: run_tests
    
  # userspace.dataflow.node.agent:node
  - name: node
    kind: process.lua
    meta:
      name: Agent Execution Node
      comment: Dataflow node for executing agents with new configuration schema and full agent framework integration.
      tags:
        - dataflow
        - agent
        - node
        - process
        - execution
      description: |
        Main dataflow node process for agent execution. Supports both registry-based and inline agent
        configuration, arena execution with iterations, tool calling, control directives, memory integration,
        and proper output routing. Uses the new agent framework via agent_context and tool_caller.
      default_host: app:processes
    source: file://node.lua
    modules:
      - json
      - time
      - uuid
      - env
      - funcs
    imports:
      agent_ref: userspace.dataflow:agent_ref
      tools: wippy.agent.discovery:tools
      agent_consts: userspace.dataflow.node.agent:consts
      agent_context: wippy.agent:context
      child_output: userspace.dataflow:child_output
      consts: userspace.dataflow:consts
      control_handler: userspace.dataflow.node.agent:control_handler
      delegation_handler: userspace.dataflow.node.agent:delegation_handler
      node_sdk: userspace.dataflow:node
      prompt_builder: userspace.dataflow.node.agent:prompt_builder
      tool_caller: wippy.agent.tools:caller
      lifecycle_runtime: wippy.agent:lifecycle_runtime
      checkpoint_runtime: wippy.agent:checkpoint_runtime
    method: run

  # userspace.dataflow.node.agent:checkpoint
  - name: checkpoint
    kind: function.lua
    meta:
      type: checkpoint
      comment: Default dataflow agent checkpoint summarizer for token-threshold cuts.
    source: file://checkpoint.lua
    modules:
      - json
    imports:
      prompt: wippy.llm:prompt
      llm: wippy.llm:llm
    method: handler

  # userspace.dataflow.node.agent:checkpoint_test
  - name: checkpoint_test
    kind: function.lua
    meta:
      type: test
      suite: agent_checkpoint
      comment: Unit tests for the default dataflow checkpoint payload formatting.
    source: file://checkpoint_test.lua
    imports:
      checkpoint: userspace.dataflow.node.agent:checkpoint
      test: wippy.test:test
    method: run_tests
    
  # userspace.dataflow.node.agent:prompt_builder
  - name: prompt_builder
    kind: library.lua
    meta:
      name: Agent Prompt Builder
      comment: Builds prompts for agent execution by reconstructing conversation history from dataflow persistence with proper tool call ID mapping and memory recall integration.
      tags:
        - dataflow
        - agent
        - prompt
        - conversation
        - reconstruction
      description: |
        Reconstructs conversation history from stored agent actions, observations, and memory recalls.
        Preserves tool call ID mapping for proper function_call/function_result pairing, handles
        memory recall injection from agent framework, and maintains all message metadata for
        accurate conversation reconstruction.
    source: file://prompt_builder.lua
    modules:
      - json
    imports:
      prompt: wippy.llm:prompt
      agent_consts: userspace.dataflow.node.agent:consts
      data_reader: userspace.dataflow.persist:data_reader
    method: prompt_builder

  # userspace.dataflow.node.agent:agent_truncation_test
  - name: agent_truncation_test
    kind: function.lua
    meta:
      name: Agent Node Truncation Test
      type: test
      comment: Integration test verifying agent node handles truncated LLM responses
      group: Workflow / Agent Node
      tags:
        - dataflow
        - agent
        - truncation
        - test
    source: file://agent_truncation_test.lua
    modules:
      - uuid
    imports:
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      agent_consts: userspace.dataflow.node.agent:consts
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow.node.agent:agent_truncation_real_test
  - name: agent_truncation_real_test
    kind: function.lua
    meta:
      name: Agent Node Real LLM Truncation Test
      type: test
      test_only: true
      comment: Integration test verifying truncation handling with real Claude API
      group: Workflow / Agent Node
      tags:
        - dataflow
        - agent
        - truncation
        - integration
        - test
    source: file://agent_truncation_real_test.lua
    modules:
      - uuid
      - env
    imports:
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      agent_consts: userspace.dataflow.node.agent:consts
      test: wippy.test:test
    method: run_tests

  - name: agent_recovery_test
    kind: function.lua
    meta:
      name: Agent Recovery Tests
      type: test
      comment: Chaos and recovery tests for durable agent turn persistence across orchestrator crashes
      group: Workflow / Agent Node
      tags:
        - dataflow
        - agent
        - recovery
        - chaos
        - test
    source: file://agent_recovery_test.lua
    modules:
      - time
      - uuid
      - funcs
    imports:
      agent_consts: userspace.dataflow.node.agent:consts
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      node_reader: userspace.dataflow.persist:node_reader
      test: wippy.test:test
    method: run_tests

  - name: node_context_test
    kind: function.lua
    meta:
      name: Agent Node Context Test
      type: test
      comment: Unit test for agent-node context inheritance into agent_context.new.
      group: Workflow / Agent Node
      tags:
        - dataflow
        - agent
        - context
        - test
    source: file://node_context_test.lua
    imports:
      agent_node: userspace.dataflow.node.agent:node
      agent_consts: userspace.dataflow.node.agent:consts
      test: wippy.test:test
    method: run_tests

  - name: agent_checkpoint_test
    kind: function.lua
    meta:
      name: Agent Checkpoint Tests
      type: test
      comment: Conversation checkpoint tests for the dataflow agent node (token threshold + summarizer)
      group: Workflow / Agent Node
      timeout: "120s"
      tags:
        - dataflow
        - agent
        - checkpoint
        - test
    source: file://agent_checkpoint_test.lua
    modules:
      - time
      - uuid
      - funcs
    imports:
      agent_consts: userspace.dataflow.node.agent:consts
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      prompt: wippy.llm:prompt
      prompt_builder: userspace.dataflow.node.agent:prompt_builder
      test: wippy.test:test
    method: run_tests
