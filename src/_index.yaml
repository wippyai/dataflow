version: "1.0"
namespace: userspace.dataflow

entries:
  - name: definition
    kind: ns.definition
    readme: file://README.md
    meta:
      title: Dataflow
      description: Workflow execution engine with visual flow designer support

  # userspace.dataflow:client
  - name: client
    kind: library.lua
    meta:
      name: Unified Workflow Client
      comment: Simplified client for workflow execution, management and control
      tags:
        - workflow
        - client
        - execution
        - management
      description: "Unified client that combines execution and management functionality.\nProvides simple interface for starting, executing, canceling, and \nmonitoring workflows with proper actor-based authentication.\n"
    source: file://client.lua
    modules:
      - json
      - uuid
      - time
      - security
      - funcs
      - contract
    imports:
      commit: userspace.dataflow.persist:commit
      dataflow_consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      dataflow_repo: userspace.dataflow.persist:dataflow_repo

  # userspace.dataflow:client_test
  - name: client_test
    kind: function.lua
    meta:
      name: Workflow Client Tests
      type: test
      comment: Comprehensive test suite for the unified workflow client
      group: Workflow
      tags:
        - workflow
        - client
        - tests
        - execution
        - management
      description: |
        Tests all client functionality including workflow execution, management,
        cancellation, termination, and status checking with proper dependency
        injection and comprehensive error handling coverage.
    source: file://client_test.lua
    modules:
      - uuid
      - time
      - funcs
      - json
    imports:
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow:consts
  - name: consts
    kind: library.lua
    meta:
      name: Dataflow Constants
      comment: Central repository of constants for the dataflow system
      tags:
        - dataflow
        - constants
        - configuration
      description: "Defines constants for dataflow operations including command types, data types, \ncontent types, status values, and message topics.\n"
    source: file://consts.lua

  # userspace.dataflow:child_output
  - name: child_output
    kind: library.lua
    meta:
      name: Child Output Helpers
      comment: Shared helpers for collecting and resuming child node outputs.
    source: file://child_output.lua
    modules:
      - json
    imports:
      consts: userspace.dataflow:consts

  - name: agent_ref
    kind: library.lua
    meta:
      name: Agent Reference Resolver
      comment: Resolves agent references to display metadata through wippy.agent:resolver with registry fallback.
    source: file://agent_ref.lua
    modules:
      - contract
      - registry
      - security

  - name: agent_ref_test
    kind: function.lua
    meta:
      type: test
      suite: dataflow
      comment: Tests agent reference display resolution and fallbacks.
    source: file://agent_ref_test.lua
    imports:
      test: wippy.test:test
      agent_ref: userspace.dataflow:agent_ref
    method: run_tests

  - name: execution_identity
    kind: contract.definition
    meta:
      title: Dataflow Execution Identity
      comment: Optional app-provided bridge for durable workflow identity capture and orchestrator revival.
    methods:
      - name: capture
        description: Capture the current execution identity as an opaque actor_id plus actor_context row. Input { reason? }.
        input_schemas:
          - definition: |
              { "type": "object", "properties": { "reason": { "type": "string" } } }
            format: application/schema+json
        output_schemas:
          - definition: |
              { "type": "object", "properties": { "success": { "type": "boolean" }, "actor_id": { "type": "string" }, "actor_context": {}, "error": { "type": "string" } }, "required": ["success"] }
            format: application/schema+json
      - name: spawn_orchestrator
        description: Spawn the dataflow orchestrator for a persisted dataflow under that dataflow's captured identity. Input { dataflow_id, process_id, host_id, args? }.
        input_schemas:
          - definition: |
              { "type": "object", "properties": { "dataflow_id": { "type": "string" }, "process_id": { "type": "string" }, "host_id": { "type": "string" }, "args": { "type": "object" } }, "required": ["dataflow_id", "process_id", "host_id"] }
            format: application/schema+json
        output_schemas:
          - definition: |
              { "type": "object", "properties": { "success": { "type": "boolean" }, "pid": { "type": "string" }, "error": { "type": "string" } }, "required": ["success"] }
            format: application/schema+json

  # userspace.dataflow:integration_test
  - name: integration_test
    kind: function.lua
    meta:
      name: Dataflow Integration Tests
      type: test
      comment: End-to-end integration tests for the complete dataflow system
      group: Workflow
      tags:
        - dataflow
        - integration
        - e2e
        - workflow
        - orchestrator
      description: |
        Comprehensive integration tests that verify the complete dataflow system
        works end-to-end. Tests workflow creation, node execution, orchestrator
        coordination, and data flow through the entire system.
    source: file://integration_test.lua
    modules:
      - uuid
      - json
      - time
    imports:
      client: userspace.dataflow:client
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow:node
  - name: node
    kind: library.lua
    meta:
      name: Node SDK
      comment: SDK for creating and managing dataflow nodes
      tags:
        - dataflow
        - node
        - sdk
        - input
        - output
        - routing
        - yield
      description: |
        Complete Node SDK with multi-input handling, configurable output routing,
        child node management, yield functionality, and comprehensive completion handling.
        Supports parent-child coordination and error propagation.
    source: file://node.lua
    modules:
      - json
      - uuid
      - time
      - expr
    imports:
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader

  # userspace.dataflow:node_test
  - name: node_test
    kind: function.lua
    meta:
      name: Node SDK Tests
      type: test
      comment: Unit tests for the Node SDK with mocking
      group: Workflow
      tags:
        - dataflow
        - node
        - sdk
        - tests
        - mocking
      description: |
        Tests all Node SDK functionality including inputs, outputs, child nodes,
        yield coordination, routing, and error handling. Uses mocking for isolation.
    source: file://node_test.lua
    modules:
      - uuid
      - json
      - time
    imports:
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      node: userspace.dataflow:node
      test: wippy.test:test
    method: run_tests

  # Requirements
  - name: target_db
    kind: ns.requirement
    meta:
      description: "Application database ID for dataflow persistence"
    targets:
      - entry: userspace.dataflow:target_db
        path: .default
      - entry: userspace.dataflow.migrations:01_create_dataflows_table
        path: ".meta.target_db"
      - entry: userspace.dataflow.migrations:02_create_nodes_table
        path: ".meta.target_db"
      - entry: userspace.dataflow.migrations:03_create_data_table
        path: ".meta.target_db"
      - entry: userspace.dataflow.migrations:05_create_dataflow_commits_table
        path: ".meta.target_db"
      - entry: userspace.dataflow.migrations:06_add_durability_indexes
        path: ".meta.target_db"

  - name: web_host_origin_env
    kind: ns.requirement
    meta:
      description: "Environment variable that defines the public web host origin URL"
    default: "userspace.dataflow.env:web_host_origin"
    targets:
      - entry: userspace.dataflow.session.views:env_mapping
        path: ".mappings.web_host_origin"

  - name: checkpoint_function_id
    kind: ns.requirement
    meta:
      description: "Default function ID for dataflow agent checkpoints; trait checkpoint bindings take precedence."
    default: "userspace.dataflow.node.agent:checkpoint"
    targets:
      - entry: userspace.dataflow.env:checkpoint_function_id
        path: ".default"

  - name: process_host
    kind: ns.requirement
    meta:
      description: "Process host the supervised revival sweeper service runs on"
    default: app:processes
    targets:
      - entry: userspace.dataflow.runner:sweeper.service
        path: .host

  - name: user_security_scope
    kind: ns.requirement
    meta:
      description: "Application security scope/group that may execute user-owned dataflow runtimes"
    targets:
      - entry: userspace.dataflow.security:runtime_process_spawn
        path: ".groups +="
      - entry: userspace.dataflow.security:runtime_process_registry
        path: ".groups +="

  - name: sweeper_security_scope
    kind: ns.requirement
    meta:
      description: "Application security scope/group for the supervised dataflow revival sweeper"
    targets:
      - entry: userspace.dataflow.runner:sweeper.service
        path: ".lifecycle.security.groups +="

  # Dependencies
  - name: dep.wippy.test
    kind: ns.dependency
    meta:
      description: "Testing framework"
    component: "wippy/test"
    version: ">=v0.4.0"

  - name: dep.wippy.migration
    kind: ns.dependency
    meta:
      description: "Database migration framework"
    component: "wippy/migration"
    version: ">=v0.3.0"

  - name: dep.wippy.agent
    kind: ns.dependency
    meta:
      description: "Agent framework for agent node execution"
    component: "wippy/agent"
    version: ">=v0.4.12"

  - name: dep.wippy.llm
    kind: ns.dependency
    meta:
      description: "LLM interface for prompt building"
    component: "wippy/llm"
    version: "*"

  - name: dep.wippy.session
    kind: ns.dependency
    meta:
      description: "Session artifact persistence"
    component: "wippy/session"
    version: "*"
