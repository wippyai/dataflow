version: "1.0"
namespace: userspace.dataflow.env

entries:
  # userspace.dataflow.env:memory
  - name: memory
    kind: env.storage.memory
    meta:
      comment: Memory-based environment variable storage
    lifecycle:
      auto_start: true

  # userspace.dataflow.env:web_host_origin
  - name: web_host_origin
    kind: env.variable
    meta:
      comment: Public URL for frontend consumption
      icon: tabler:globe
    storage: userspace.dataflow.env:memory
    default: https://front.wippy.ai

  # userspace.dataflow.env:checkpoint_function_id
  - name: checkpoint_function_id
    kind: env.variable
    meta:
      comment: Default function ID for agent checkpoint summaries when a node does not configure one
      icon: tabler:checkpoint
      private: true
    variable: DATAFLOW_CHECKPOINT_FUNCTION_ID
    storage: userspace.dataflow.env:memory
