version: "1.0"
namespace: userspace.dataflow.runner

entries:
  # userspace.dataflow.runner:orchestrator
  - name: orchestrator
    kind: process.lua
    meta:
      name: Dataflow Orchestrator
      comment: Main coordination process for workflow execution
      tags:
        - dataflow
        - orchestrator
        - execution
        - coordination
      description: |
        Coordinates workflow execution using scheduler and workflow_state components.
        Manages process lifecycle, message routing, and state transitions.
        Replaces node_runner with cleaner separation of concerns between
        scheduling logic, state management, and execution coordination.
      default_host: app:processes
    source: file://orchestrator.lua
    modules:
      - json
      - uuid
      - funcs
      - security
      - time
      - logger
    imports:
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      scheduler: userspace.dataflow.runner:scheduler
      workflow_state: userspace.dataflow.runner:workflow_state
    method: run
    
  # userspace.dataflow.runner:orchestrator_test
  - name: orchestrator_test
    kind: function.lua
    meta:
      name: Orchestrator Tests
      type: test
      comment: Comprehensive test suite for the dataflow orchestrator
      group: Workflow
      tags:
        - dataflow
        - orchestrator
        - tests
        - execution
        - coordination
        - actor
      description: |
        Comprehensive test coverage for orchestrator including initialization,
        node execution, commit processing, yield handling, process events,
        workflow completion, cancellation, and edge cases.
    source: file://orchestrator_test.lua
    modules:
      - uuid
      - time
    imports:
      consts: userspace.dataflow:consts
      orchestrator: userspace.dataflow.runner:orchestrator
      test: wippy.test:test
    method: run_tests

  - name: orchestrator_process_event_test
    kind: function.lua
    meta:
      name: Orchestrator Process Event Tests
      type: test
      comment: Regression coverage for process-exit failure propagation
      group: Workflow
      tags:
        - dataflow
        - orchestrator
        - tests
    source: file://orchestrator_process_event_test.lua
    imports:
      consts: userspace.dataflow:consts
      orchestrator: userspace.dataflow.runner:orchestrator
      test: wippy.test:test
    method: run_tests
    
  # userspace.dataflow.runner:sweeper
  - name: sweeper
    kind: process.lua
    meta:
      name: Dataflow Revival Sweeper
      comment: Periodic service that respawns orchestrators for parked non-terminal dataflows
      tags:
        - dataflow
        - revival
        - durability
        - supervision
      description: |
        Scans for dataflows in a non-terminal status (pending/running) with no live
        dataflow.{id} orchestrator process and respawns them. Covers crash-during-park
        and dropped commit notifications for days-long human-in-the-loop runs.
      default_host: app:processes
    source: file://sweeper.lua
    modules:
      - time
      - env
      - logger
    imports:
      dataflow_repo: userspace.dataflow.persist:dataflow_repo
      client: userspace.dataflow:client
    method: run

  # userspace.dataflow.runner:sweeper.service
  - name: sweeper.service
    kind: process.service
    meta:
      comment: Supervises the revival sweeper with the module. host literal default is overridden by the module's process_host requirement.
    process: userspace.dataflow.runner:sweeper
    host: app:processes
    lifecycle:
      depends_on: []
      auto_start: true
      security:
        actor:
          id: system.dataflow.sweeper
        groups: []

  # userspace.dataflow.runner:sweeper_test
  - name: sweeper_test
    kind: function.lua
    meta:
      name: Revival Sweeper Tests
      type: test
      comment: Unit tests for the revival sweeper
      group: Workflow
      tags:
        - dataflow
        - revival
        - durability
        - tests
      description: |
        Tests the revival sweeper's dead-orchestrator detection, respawn behavior,
        live-process skipping, and env-driven interval clamping using dependency
        injection.
    source: file://sweeper_test.lua
    modules:
      - time
    imports:
      consts: userspace.dataflow:consts
      sweeper: userspace.dataflow.runner:sweeper
      test: wippy.test:test
    method: run_tests

  # userspace.dataflow.runner:scheduler
  - name: scheduler
    kind: library.lua
    meta:
      name: Pure Dataflow Scheduler
      comment: Pure scheduling logic for determining next workflow execution steps
      tags:
        - dataflow
        - scheduler
        - execution
        - pure
        - testable
      description: |
        Pure function-based scheduler that determines what should execute next in a dataflow.
        Takes workflow state snapshots and returns execution decisions without side effects.
        Handles yield-driven, input-ready, and root node execution priorities with deadlock detection.
    source: file://scheduler.lua
    modules:
      - time
    imports:
      consts: userspace.dataflow:consts
    
  # userspace.dataflow.runner:scheduler_test
  - name: scheduler_test
    kind: function.lua
    meta:
      name: Scheduler Tests
      type: test
      comment: Comprehensive test suite for the pure scheduler
      group: Workflow
      tags:
        - dataflow
        - scheduler
        - tests
        - pure-function
      description: |
        Comprehensive test coverage for scheduler including empty states, root execution,
        yield-driven workflows, input readiness, priority ordering, completion detection,
        edge cases, and complex multi-level scenarios.
    source: file://scheduler_test.lua
    imports:
      consts: userspace.dataflow:consts
      scheduler: userspace.dataflow.runner:scheduler
      test: wippy.test:test
    method: run_tests
    
  # userspace.dataflow.runner:workflow_state
  - name: workflow_state
    kind: library.lua
    meta:
      name: Unified Workflow State Manager
      comment: Unified state management for dataflow execution
      tags:
        - dataflow
        - state
        - execution
        - runtime
        - persistence
        - unified
      description: |
        Replaces root_state and execution_state with single unified component.
        Handles database loading, commit processing, state updates, and recovery.
        Provides state snapshots to scheduler and manages process/yield tracking.
        Integrates persistent and runtime state management with proper recovery.
    source: file://workflow_state.lua
    modules:
      - sql
      - json
      - uuid
      - time
    imports:
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      dataflow_repo: userspace.dataflow.persist:dataflow_repo
      node_reader: userspace.dataflow.persist:node_reader
      ops: userspace.dataflow.persist:ops
    
  # userspace.dataflow.runner:workflow_state_test
  - name: workflow_state_test
    kind: function.lua
    meta:
      name: Workflow State Tests
      type: test
      comment: Comprehensive test suite for the unified workflow state manager
      group: Workflow
      tags:
        - dataflow
        - state
        - tests
        - persistence
        - recovery
        - integration
      description: |
        Comprehensive test coverage for workflow state including state loading,
        commit processing, process tracking, yield management, input tracking,
        scheduler integration, recovery scenarios, and edge cases.
    source: file://workflow_state_test.lua
    modules:
      - sql
      - json
      - uuid
      - time
    imports:
      commit: userspace.dataflow.persist:commit
      consts: userspace.dataflow:consts
      data_reader: userspace.dataflow.persist:data_reader
      test: wippy.test:test
      workflow_state: userspace.dataflow.runner:workflow_state
    method: run_tests
    
